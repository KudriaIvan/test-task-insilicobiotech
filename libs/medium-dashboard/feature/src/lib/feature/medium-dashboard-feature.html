<div tuiGroup class="mode-toggle">
  <label tuiBlock [tuiSkeleton]="isLoading()">
    <input
      tuiRadio
      type="radio"
      name="chart-mode"
      value="absolute"
      [ngModel]="mode()"
      [ngModelOptions]="{standalone: true}"
      (ngModelChange)="mode.set($event)"
    />
    Absolute
  </label>
  <label tuiBlock [tuiSkeleton]="isLoading()">
    <input
      tuiRadio
      type="radio"
      name="chart-mode"
      value="relative"
      [ngModel]="mode()"
      [ngModelOptions]="{standalone: true}"
      (ngModelChange)="mode.set($event)"
    />
    Relative
  </label>
</div>

@if (error()) {
  <p>{{ error() }}</p>
} @else {
  <div [tuiSkeleton]="isLoading()" class="chart-skeleton">
    @if (chartOptions(); as options) {
      <lib-medium-chart [options]="options" />
    }
  </div>
}
